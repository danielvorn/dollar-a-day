<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Lyz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap');

  :root {
    --bg-top: #3a1422;
    --bg-bottom: #5c1d30;
    --card: rgba(255, 255, 255, 0.06);
    --card-border: rgba(232, 180, 188, 0.25);
    --gold: #e3b97f;
    --blush: #f3c9d2;
    --text-soft: #f6e3e8;
    --text-muted: #d9aab6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
  }
  body {
    font-family: 'Cormorant Garamond', serif;
    background: radial-gradient(circle at 50% 0%, var(--bg-bottom) 0%, var(--bg-top) 70%);
    color: var(--text-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }
  .bg-deco {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.5;
    background-image: radial-gradient(2px 2px at 20% 30%, var(--gold), transparent),
                       radial-gradient(2px 2px at 75% 15%, var(--blush), transparent),
                       radial-gradient(1.5px 1.5px at 60% 70%, var(--gold), transparent),
                       radial-gradient(1.5px 1.5px at 30% 85%, var(--blush), transparent),
                       radial-gradient(2px 2px at 90% 55%, var(--gold), transparent);
    background-repeat: no-repeat;
  }
  .wrap {
    max-width: 420px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .heart-icon {
    width: 30px;
    height: 30px;
    margin: 0 auto 0.75rem;
    opacity: 0.85;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.02em;
    margin: 0 0 0.4rem;
    color: var(--blush);
  }
  .subtitle {
    font-size: 16px;
    color: var(--text-muted);
    margin: 0 0 2rem;
    letter-spacing: 0.02em;
  }
  .card {
    background: var(--card);
    border: 0.5px solid var(--card-border);
    border-radius: 20px;
    padding: 2.5rem 1.5rem;
    backdrop-filter: blur(6px);
  }
  .label {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    margin: 0 0 0.75rem;
  }
  .amount {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 64px;
    line-height: 1;
    margin: 0;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(227, 185, 127, 0.25);
  }
  .days {
    font-size: 17px;
    color: var(--text-soft);
    margin: 1rem 0 0;
  }
  .divider {
    width: 60px;
    height: 1px;
    background: var(--card-border);
    margin: 1.75rem auto;
  }
  .since {
    font-size: 15px;
    color: var(--text-muted);
    margin: 0;
    font-style: italic;
  }
  footer {
    margin-top: 1.75rem;
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
    opacity: 0.8;
  }
</style>
</head>
<body>
<div class="bg-deco"></div>
<div class="wrap">
  <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="#e3b97f" stroke-width="1.4">
    <path d="M12 21s-7.5-4.6-10-9.1C0.2 8.7 1.7 5 5.4 4.2c2.1-0.4 4 0.6 5.1 2.3 0.4 0.6 1 0.6 1.4 0 1.1-1.7 3-2.7 5.1-2.3 3.7 0.8 5.2 4.5 3.4 7.7C19.5 16.4 12 21 12 21z"/>
  </svg>
  <h1>A debt of the heart</h1>
  <p class="subtitle">Owed to Lyz, one day at a time</p>

  <div class="card">
    <p class="label">Currently owed</p>
    <p class="amount" id="owed">$0</p>
    <p class="days" id="days-text">0 days and counting</p>
    <div class="divider"></div>
    <p class="since">Counting since June 29, 2026, with 8% annual interest</p>
  </div>

  <footer>A dollar a day, for every day we haven't been on a date yet.</footer>
</div>

<script>
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function daysBetween(isoA, isoB) {
  const a = new Date(isoA + 'T00:00:00');
  const b = new Date(isoB + 'T00:00:00');
  return Math.round((b - a) / 86400000);
}

const START_DATE = '2026-06-29';
const DAILY_RATE = 0.08 / 365; // 8% APR, simple daily compounding

function render() {
  const today = todayISO();
  const days = Math.max(0, daysBetween(START_DATE, today));

  // Each day adds $1 of principal, which then compounds daily at the APR
  // until "today". Sum the future value of each daily $1 contribution.
  let total = 0;
  for (let d = 1; d <= days; d++) {
    const daysCompounding = days - d + 1;
    total += Math.pow(1 + DAILY_RATE, daysCompounding);
  }

  const owed = Math.round(total * 100) / 100;
  document.getElementById('owed').textContent = '$' + owed.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  document.getElementById('days-text').textContent = days + (days === 1 ? ' day' : ' days') + ' and counting';
}

render();
</script>
</body>
</html>
